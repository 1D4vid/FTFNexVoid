<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexVoid | Intelligence Panel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap');
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Space Grotesk', sans-serif; }
        body {
            background: url('https://cdn.discordapp.com/attachments/1478479989803323392/1488641677529710652/8269893be15f4dc76e1e9060eda6f7bd.jpg') no-repeat center center fixed;
            background-size: cover; color: white; display: flex; height: 100vh; overflow: hidden;
        }

        .overlay { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: -1; }

        /* --- TELA DE LOGIN --- */
        #login-screen {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(15,15,15,0.8); backdrop-filter: blur(15px); padding: 40px;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); width: 350px; text-align: center; z-index: 100;
        }
        #login-screen h1 { font-size: 26px; font-weight: 700; margin-bottom: 20px; letter-spacing: 2px;}
        #login-screen input {
            width: 100%; padding: 12px; margin-bottom: 20px; background: rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 6px; text-align: center;
        }
        #login-screen button {
            width: 100%; padding: 12px; background: white; color: black; font-weight: 700;
            border: none; border-radius: 6px; cursor: pointer; transition: 0.3s;
        }
        #login-screen button:hover { background: #ccc; }

        /* --- DASHBOARD PRINCIPAL --- */
        #dashboard { display: none; width: 100%; height: 100%; z-index: 10; display: none; }

        /* Sidebar */
        .sidebar {
            width: 250px; background: rgba(10,10,10,0.8); border-right: 1px solid rgba(255,255,255,0.05);
            padding: 30px 20px; display: flex; flex-direction: column; gap: 15px;
        }
        .sidebar h2 { font-size: 20px; letter-spacing: 2px; margin-bottom: 30px; text-align: center; color: #fff;}
        .menu-btn {
            background: transparent; color: #aaa; border: none; text-align: left; padding: 15px;
            font-size: 14px; cursor: pointer; border-radius: 8px; transition: 0.3s; font-weight: 500; letter-spacing: 1px;
        }
        .menu-btn:hover, .menu-btn.active { background: rgba(255,255,255,0.1); color: white; }

        /* Content Area */
        .content { flex-grow: 1; padding: 40px; display: flex; flex-direction: column; overflow: hidden;}
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header h3 { font-size: 24px; font-weight: 500;}
        .stats-badge { background: rgba(0,0,0,0.5); padding: 10px 20px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); font-size: 14px;}
        .stats-badge span { color: #4ade80; font-weight: 700; font-size: 18px; margin-right: 10px;}

        /* Tables */
        .table-wrap { flex-grow: 1; overflow-y: auto; background: rgba(0,0,0,0.6); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05); }
        .table-wrap::-webkit-scrollbar { width: 5px; }
        .table-wrap::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(15,15,15,0.9); padding: 15px; text-align: left; font-size: 12px; color: #888; text-transform: uppercase; position: sticky; top: 0;}
        td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.02); font-size: 13px; color: #ccc;}
        tr:hover td { background: rgba(255,255,255,0.02); color: white;}

        .status-dot { display: inline-block; width: 8px; height: 8px; background: #4ade80; border-radius: 50%; box-shadow: 0 0 10px #4ade80; margin-right: 8px;}
        .hwid-text { font-family: monospace; font-size: 11px; color: #666;}
        
        .page { display: none; height: 100%; flex-direction: column; }
        .page.active { display: flex; }
        
        .log-action { color: #facc15; font-weight: 700; }
    </style>
</head>
<body>
    <div class="overlay"></div>

    <div id="login-screen">
        <h1>NEXVOID</h1>
        <input type="password" id="password" placeholder="Access Key" onkeypress="if(event.key === 'Enter') checkPass()">
        <button onclick="checkPass()">ENTER</button>
    </div>

    <div id="dashboard">
        <div class="sidebar">
            <h2>NEXVOID</h2>
            <button class="menu-btn active" onclick="switchTab('live')">📡 LIVE PLAYERS</button>
            <button class="menu-btn" onclick="switchTab('history')">📜 ACTION LOGS</button>
        </div>
        
        <div class="content">
            <!-- TELA: LIVE PLAYERS -->
            <div id="live" class="page active">
                <div class="header">
                    <h3>Atualmente Injetados</h3>
                    <div class="stats-badge"><span id="online-count">0</span> ONLINE</div>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr><th>User</th><th>Device</th><th>Executor</th><th>HWID</th><th>Status</th></tr>
                        </thead>
                        <tbody id="live-table"></tbody>
                    </table>
                </div>
            </div>

            <!-- TELA: HISTORY LOGS -->
            <div id="history" class="page">
                <div class="header">
                    <h3>Histórico de Ações Global</h3>
                    <button style="width: auto; padding: 10px 20px; font-size: 12px; background: rgba(255,255,255,0.1); color: white; border:1px solid rgba(255,255,255,0.2);" onclick="clearLogs()">CLEAR LOGS</button>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr><th>Time</th><th>User</th><th>Action</th><th>Value / Status</th></tr>
                        </thead>
                        <tbody id="history-table"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SENHA = "david111";
        const FIREBASE = "https://nexvoid-7fe5d-default-rtdb.firebaseio.com/";

        function checkPass() {
            if(document.getElementById("password").value === SENHA) {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("dashboard").style.display = "flex";
                startSystem();
            } else { alert("Access Denied"); }
        }

        function switchTab(tabId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.menu-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');
        }

        async function fetchLive() {
            try {
                let res = await fetch(FIREBASE + "live.json", { cache: "no-store" });
                let data = await res.json();
                let tbody = document.getElementById("live-table");
                tbody.innerHTML = "";
                let count = 0;
                let now = Math.floor(Date.now() / 1000);

                for (let key in data) {
                    let p = data[key];
                    if (now - p.LastSeen < 30) {
                        count++;
                        tbody.innerHTML += `<tr>
                            <td><span class="status-dot"></span><b>${p.Name}</b></td>
                            <td>${p.Device}</td>
                            <td>${p.Exec}</td>
                            <td class="hwid-text">${p.HWID.substring(0,25)}...</td>
                            <td>Injected</td>
                        </tr>`;
                    }
                }
                document.getElementById("online-count").innerText = count;
            } catch (e) { console.log(e); }
        }

        async function fetchLogs() {
            try {
                // Pega os logs em ordem decrescente (mais novos primeiro)
                let res = await fetch(FIREBASE + "history.json?orderBy=\"$key\"&limitToLast=100", { cache: "no-store" });
                let data = await res.json();
                let tbody = document.getElementById("history-table");
                tbody.innerHTML = "";
                
                if(data) {
                    // Reverte para mostrar do mais novo pro mais velho
                    let keys = Object.keys(data).reverse();
                    for(let k of keys) {
                        let log = data[k];
                        tbody.innerHTML += `<tr>
                            <td style="color:#888;">${log.Time}</td>
                            <td><b>${log.User}</b></td>
                            <td><span class="log-action">${log.Action}</span></td>
                            <td>${log.Details}</td>
                        </tr>`;
                    }
                }
            } catch(e) { console.log(e); }
        }

        async function clearLogs() {
            if(confirm("Tem certeza que deseja apagar TODO o histórico?")) {
                await fetch(FIREBASE + "history.json", { method: "DELETE" });
                fetchLogs();
            }
        }

        function startSystem() {
            fetchLive();
            fetchLogs();
            setInterval(fetchLive, 5000);
            setInterval(fetchLogs, 10000); // Atualiza os logs a cada 10 seg
        }
    </script>
</body>
</html>
